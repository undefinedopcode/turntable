# Example Turntable configuration.
# Run from this directory with:
#   turntable -c examples/turntable.yaml 'SELECT * FROM customers'
# See DESIGN.md §10 for the full config schema.

sources:
  # JSON file (array of objects) exposed as the logical name "customers".
  customers:
    connector: json
    path: ./examples/data/customers.json

  # CSV file with type inference, exposed as "orders".
  orders:
    connector: csv
    path: ./examples/data/orders.csv
    delimiter: ","

  # YAML file (sequence of mappings) exposed as "products".
  products:
    connector: yaml
    path: ./examples/data/products.yaml

  # Excel workbook: sheet="*" registers every sheet under its own name (v0.3).
  regions:
    connector: excel
    path: ./examples/data/regions.xlsx
    sheet: regions
  quarters:
    connector: excel
    path: ./examples/data/regions.xlsx
    sheet: quarters

  # SQL database, credentials via env var interpolation (v0.2).
  warehouse:
    connector: sql
    driver: postgres
    dsn: "postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:5432/analytics?sslmode=require"

  # In-memory SQLite example table (v0.2). Load it with examples/init_sqlite.sql.
  inventory:
    connector: sql
    driver: sqlite
    dsn: "./examples/data/inventory.db"
    table: inventory

defaults:
  output: table
  max-rows: 1000000