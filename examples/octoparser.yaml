# Example OctoParser configuration.
# Run from this directory with:
#   octoparser -c examples/octoparser.yaml 'SELECT * FROM customers'
# See DESIGN.md §10 for the full config schema.

sources:
  # JSON file (array of objects) exposed as the logical name "customers".
  customers:
    connector: json
    path: ./examples/data/customers.json

  # CSV file with type inference, exposed as "orders".
  orders:
    connector: csv
    path: ./examples/data/orders.csv
    delimiter: ","

  # YAML file (sequence of mappings) exposed as "products".
  products:
    connector: yaml
    path: ./examples/data/products.yaml

  # SQL database, credentials via env var interpolation (v0.2).
  warehouse:
    connector: sql
    driver: postgres
    dsn: "postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:5432/analytics?sslmode=require"

defaults:
  output: table
  max-rows: 1000000