<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>turntable</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --border: #2a2f3a;
    --fg: #e6e9ef; --muted: #8b93a7; --accent: #6ea8fe; --accent2: #2b6cb0;
    --err: #ff6b6b; --null: #5a6377; --ok: #5fd38d;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: grid; grid-template-rows: auto 1fr; height: 100vh;
  }
  header {
    display: flex; align-items: baseline; gap: 12px;
    padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  header .brand { font-weight: 700; letter-spacing: .3px; }
  header .tag { color: var(--muted); font-size: 12px; }
  main { display: grid; grid-template-columns: 240px 1fr; min-height: 0; }
  aside {
    border-right: 1px solid var(--border); background: var(--panel);
    overflow: auto; padding: 10px;
  }
  aside h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 4px 4px 8px; }
  .src { border-radius: 6px; }
  .src > .row { display: flex; align-items: center; gap: 6px; padding: 5px 6px; border-radius: 6px; cursor: pointer; }
  .src > .row:hover { background: var(--panel2); }
  .src .name { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .src .conn { color: var(--muted); font-size: 11px; margin-left: auto; }
  .cols { margin: 0 0 4px 18px; padding: 0; list-style: none; color: var(--muted); }
  .cols li { padding: 2px 6px; font-family: ui-monospace, Menlo, monospace; font-size: 12px; cursor: pointer; border-radius: 4px; }
  .cols li:hover { background: var(--panel2); color: var(--fg); }
  .cols .ty { color: #c08bd6; }
  .work { display: grid; grid-template-rows: auto auto 1fr; min-height: 0; }
  .editor { padding: 12px 16px 0; }
  textarea {
    width: 100%; height: 120px; resize: vertical; background: var(--panel2);
    color: var(--fg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; outline: none;
  }
  textarea:focus { border-color: var(--accent2); }
  .toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; }
  button {
    background: var(--accent2); color: #fff; border: 0; border-radius: 7px;
    padding: 7px 14px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: var(--accent); }
  button.ghost { background: transparent; color: var(--fg); border: 1px solid var(--border); }
  button.ghost:hover { border-color: var(--accent); color: var(--accent); }
  button:disabled { opacity: .5; cursor: default; }
  .status { color: var(--muted); font-size: 12px; margin-left: auto; }
  .hint { color: var(--muted); font-size: 12px; }
  kbd { background: var(--panel2); border: 1px solid var(--border); border-radius: 4px; padding: 0 5px; font-size: 11px; }
  .results { overflow: auto; padding: 0 16px 16px; min-height: 0; }
  .banner { margin: 4px 0 12px; padding: 10px 12px; border-radius: 8px; white-space: pre-wrap;
    font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; }
  .banner.err { background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.4); color: var(--err); }
  .banner.note { background: rgba(110,168,254,.08); border: 1px solid var(--border); color: var(--muted); }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); white-space: nowrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  th { position: sticky; top: 0; background: var(--panel); color: var(--muted); font-weight: 600; }
  th .ty { color: #c08bd6; font-weight: 400; margin-left: 6px; font-size: 11px; }
  tbody tr:hover { background: var(--panel2); }
  td.null { color: var(--null); font-style: italic; }
  td.num { text-align: right; }
  pre.plan { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 12px;
    overflow: auto; font-size: 12.5px; }
  details.add { margin: 0 0 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel2); }
  details.add > summary { cursor: pointer; padding: 7px 10px; font-size: 12px; color: var(--muted); user-select: none; }
  details.add[open] > summary { color: var(--fg); border-bottom: 1px solid var(--border); }
  .form { padding: 10px; display: grid; gap: 8px; }
  .form input, .form select, .form textarea {
    width: 100%; background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px; font: 12px/1.4 ui-monospace, Menlo, monospace; outline: none;
  }
  .form input:focus, .form select:focus, .form textarea:focus { border-color: var(--accent2); }
  .form label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 2px; }
  .form textarea { resize: vertical; min-height: 56px; }
  .form .msg { font-size: 11.5px; min-height: 14px; }
  .form .msg.err { color: var(--err); }
  .form .msg.ok { color: var(--ok); }
</style>
</head>
<body>
  <header>
    <span class="brand">turntable</span>
    <span class="tag">query anything with SQL</span>
  </header>
  <main>
    <aside>
      <h2>Sources</h2>
      <details class="add">
        <summary>+ Add source</summary>
        <div class="form">
          <div>
            <label>Name</label>
            <input id="f-name" placeholder="sales" spellcheck="false">
          </div>
          <div>
            <label>Connector</label>
            <select id="f-conn">
              <option value="csv">csv</option>
              <option value="json">json</option>
              <option value="yaml">yaml</option>
              <option value="excel">excel</option>
              <option value="parquet">parquet</option>
              <option value="sql">sql</option>
              <option value="http">http</option>
              <option value="linear">linear</option>
              <option value="dynamodb">dynamodb</option>
              <option value="azuretables">azuretables</option>
              <option value="trello">trello</option>
              <option value="azuredevops">azuredevops</option>
              <option value="cloudwatchlogs">cloudwatchlogs</option>
              <option value="cloudwatch">cloudwatch</option>
            </select>
          </div>
          <div>
            <label>Fields (one <code>key=value</code> per line)</label>
            <textarea id="f-fields" spellcheck="false" placeholder="path=/data/sales.csv"></textarea>
          </div>
          <button id="f-add">Add source</button>
          <div class="msg" id="f-msg"></div>
        </div>
      </details>
      <div id="sources"></div>
    </aside>
    <section class="work">
      <div class="editor">
        <textarea id="q" spellcheck="false" placeholder="SELECT * FROM ... LIMIT 10"></textarea>
      </div>
      <div class="toolbar">
        <button id="run">Run</button>
        <button id="explain" class="ghost">Explain</button>
        <button id="csv" class="ghost" disabled>Export CSV</button>
        <span class="hint">&nbsp;<kbd>Ctrl/⌘</kbd>+<kbd>Enter</kbd> to run</span>
        <span class="status" id="status"></span>
      </div>
      <div class="results" id="results"></div>
    </section>
  </main>

<script>
const $ = (s) => document.querySelector(s);
const qEl = $("#q"), statusEl = $("#status"), resultsEl = $("#results"), csvBtn = $("#csv");
let lastResult = null;

async function loadSources() {
  const box = $("#sources");
  try {
    const res = await fetch("/api/sources");
    const list = await res.json();
    box.innerHTML = "";
    if (!list || list.length === 0) { box.innerHTML = '<div class="hint" style="padding:6px">no sources configured<br>(use -c config or query qualified refs like <code>csv:./x.csv</code>)</div>'; return; }
    for (const s of list) {
      const wrap = document.createElement("div"); wrap.className = "src";
      const row = document.createElement("div"); row.className = "row";
      const name = document.createElement("span"); name.className = "name"; name.textContent = s.name;
      const conn = document.createElement("span"); conn.className = "conn"; conn.textContent = s.connector;
      row.appendChild(name); row.appendChild(conn);
      const cols = document.createElement("ul"); cols.className = "cols"; cols.style.display = "none";
      let loaded = false;
      row.addEventListener("click", async () => {
        cols.style.display = cols.style.display === "none" ? "block" : "none";
        if (!loaded) {
          loaded = true;
          try {
            const r = await fetch("/api/schema?source=" + encodeURIComponent(s.name));
            const sc = await r.json();
            if (sc.error) { cols.innerHTML = '<li style="color:var(--err)">'+escapeText(sc.error)+'</li>'; return; }
            for (const c of (sc.columns||[])) {
              const li = document.createElement("li");
              li.textContent = c.name;
              const ty = document.createElement("span"); ty.className = "ty"; ty.textContent = " " + c.type;
              li.appendChild(ty);
              li.title = "insert column";
              li.addEventListener("click", (e) => { e.stopPropagation(); insertAtCursor(c.name); });
              cols.appendChild(li);
            }
          } catch (e) { cols.innerHTML = '<li style="color:var(--err)">'+escapeText(String(e))+'</li>'; }
        }
      });
      name.addEventListener("click", (e) => { e.stopPropagation(); insertAtCursor(s.name); });
      wrap.appendChild(row); wrap.appendChild(cols); box.appendChild(wrap);
    }
  } catch (e) { box.innerHTML = '<div class="hint">'+escapeText(String(e))+'</div>'; }
}

function insertAtCursor(text) {
  const start = qEl.selectionStart, end = qEl.selectionEnd, v = qEl.value;
  qEl.value = v.slice(0, start) + text + v.slice(end);
  qEl.selectionStart = qEl.selectionEnd = start + text.length;
  qEl.focus();
}

function escapeText(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

async function run(explain) {
  const query = qEl.value.trim();
  if (!query) return;
  statusEl.textContent = "running…";
  csvBtn.disabled = true; lastResult = null;
  try {
    const res = await fetch("/api/query", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ query, explain })
    });
    const data = await res.json();
    render(data);
  } catch (e) {
    resultsEl.innerHTML = '<div class="banner err">'+escapeText(String(e))+'</div>';
    statusEl.textContent = "";
  }
}

function render(data) {
  resultsEl.innerHTML = "";
  if (data.error) {
    resultsEl.innerHTML = '<div class="banner err">'+escapeText(data.error)+'</div>';
    statusEl.textContent = (data.elapsed_ms!=null ? data.elapsed_ms+" ms" : "");
    return;
  }
  if (data.explain != null) {
    const pre = document.createElement("pre"); pre.className = "plan"; pre.textContent = data.explain;
    resultsEl.appendChild(pre);
    statusEl.textContent = data.elapsed_ms + " ms";
    return;
  }
  lastResult = data; csvBtn.disabled = false;
  if (data.truncated) {
    const n = document.createElement("div"); n.className = "banner note";
    n.textContent = "results truncated to " + data.count + " rows (raise with --max-rows)";
    resultsEl.appendChild(n);
  }
  const table = document.createElement("table");
  const thead = document.createElement("thead"); const htr = document.createElement("tr");
  for (const c of data.columns) {
    const th = document.createElement("th");
    th.textContent = c.name;
    const ty = document.createElement("span"); ty.className = "ty"; ty.textContent = c.type;
    th.appendChild(ty); htr.appendChild(th);
  }
  thead.appendChild(htr); table.appendChild(thead);
  const tbody = document.createElement("tbody");
  for (const row of data.rows) {
    const tr = document.createElement("tr");
    for (const cell of row) {
      const td = document.createElement("td");
      if (cell === null) { td.textContent = "NULL"; td.className = "null"; }
      else if (typeof cell === "number") { td.textContent = String(cell); td.className = "num"; }
      else if (typeof cell === "object") { td.textContent = JSON.stringify(cell); }
      else { td.textContent = String(cell); }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody); resultsEl.appendChild(table);
  statusEl.textContent = data.count + " row" + (data.count===1?"":"s") + " · " + data.elapsed_ms + " ms";
}

function exportCSV() {
  if (!lastResult) return;
  const esc = (s) => { s = (s===null) ? "" : (typeof s==="object" ? JSON.stringify(s) : String(s));
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; };
  const lines = [lastResult.columns.map(c => esc(c.name)).join(",")];
  for (const row of lastResult.rows) lines.push(row.map(esc).join(","));
  const blob = new Blob([lines.join("\n")], {type: "text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "turntable.csv"; a.click();
  URL.revokeObjectURL(url);
}

async function addSource() {
  const name = $("#f-name").value.trim();
  const connector = $("#f-conn").value;
  const msg = $("#f-msg");
  const fields = {};
  for (const line of $("#f-fields").value.split("\n")) {
    const t = line.trim();
    if (!t) continue;
    const i = t.indexOf("=");
    if (i <= 0) { msg.className = "msg err"; msg.textContent = 'bad field "'+t+'" (want key=value)'; return; }
    fields[t.slice(0, i).trim()] = t.slice(i + 1).trim();
  }
  if (!name) { msg.className = "msg err"; msg.textContent = "name is required"; return; }
  msg.className = "msg"; msg.textContent = "adding…";
  try {
    const res = await fetch("/api/sources", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name, connector, fields })
    });
    const data = await res.json();
    if (data.error) { msg.className = "msg err"; msg.textContent = data.error; return; }
    msg.className = "msg ok"; msg.textContent = "registered: " + (data.registered || []).join(", ");
    $("#f-name").value = ""; $("#f-fields").value = "";
    loadSources();
  } catch (e) { msg.className = "msg err"; msg.textContent = String(e); }
}

$("#f-add").addEventListener("click", addSource);
$("#run").addEventListener("click", () => run(false));
$("#explain").addEventListener("click", () => run(true));
csvBtn.addEventListener("click", exportCSV);
qEl.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); run(false); }
});
loadSources();
qEl.focus();
</script>
</body>
</html>
